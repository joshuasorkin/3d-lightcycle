# fly.toml app configuration file generated for 3d-lightcycle on 2026-03-05T01:27:33-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = '3d-lightcycle'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[http_service.concurrency]
  type = "connections"
  hard_limit = 250
  soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
